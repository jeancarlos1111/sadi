services:
  db:
    image: postgres:15-alpine
    container_name: sadi_postgres
    restart: always
    network_mode: "host"
    environment:
      POSTGRES_USER: sadi
      POSTGRES_PASSWORD: sadi
      POSTGRES_DB: sadi_db
      PGPORT: 5433
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadi_app
    restart: always
    network_mode: "host"
    volumes:
      - .:/var/www/html

  web:
    image: nginx:alpine
    container_name: sadi_nginx
    restart: always
    network_mode: "host"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
